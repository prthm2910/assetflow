[tool.ruff]
# Ruff configuration - PEP8 enforcement
# Docs: https://docs.astral.sh/ruff/configuration/

target-version = "py313"
line-length = 88
indent-width = 4

[tool.ruff.lint]
# Enable all rules (subset of E, F, I, N, Q, W)
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
    "RET", # flake8-return
    "PL",  # pylint
]
ignore = [
    "E501",   # line too long (handled by formatter or with noqa)
    "PLR0913", # too many arguments (sometimes needed)
    "PLR2004", # magic value comparison (sometimes needed)
]

[tool.ruff.lint.per-file-ignores]
# Ignore specific rules for specific files
"__init__.py" = ["F401"]  # unused imports ok in __init__
"tests/*" = ["E", "F", "I", "N", "PLC0415"]  # ignore all linting for tests
"**/tests/*" = ["E", "F", "I", "N", "PLC0415"]  # ignore all linting for tests
"apps/base/apps.py" = ["PLC0415"]  # signal imports in ready()
"apps/base/models.py" = ["PLC0415", "SIM102"]  # lazy imports & nested if for readability
"apps/base/signals.py" = ["PLC0415", "N806", "SIM105"]  # conditional imports, AuditLog class name, suppress pattern
"apps/base/services.py" = ["PLC0415"]  # lazy transaction import
"apps/base/permissions.py" = ["SIM102"]  # nested if for readability
"apps/base/viewsets.py" = ["PLC0415"]  # lazy service imports
"apps/core/users/views.py" = ["PLC0415"]  # lazy model imports
"apps/core/users/serializers.py" = ["PLC0415", "SIM105", "B904"]  # lazy imports & suppress pattern
"conftest.py" = ["PLC0415"]  # test fixtures
"manage.py" = ["PLC0415"]  # Django management
"assetflow/settings.py" = ["PLW0127"]  # self-assignment for settings import

[tool.ruff.format]
# Use ruff format (compatible with black)
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.ruff.lint.isort]
# isort configuration
force-single-line = false
lines-after-imports = 2
combine-as-imports = true
order-by-type = true

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "assetflow.settings"
python_files = ["test_*.py", "*_test.py"]
addopts = "-v --tb=short"

[tool.mypy]
python_version = "3.13"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
